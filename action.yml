name: "delete-releases-workflows"
author: "ophub"
description: "Delete older releases and workflow runs"
inputs:
  repo:
    description: "Repo name in the form of <owner>/<repo>"
    required: false
    default: "${{ github.repository }}"
  delete_releases:
    description: "Whether to delete releases records (true/false)"
    required: false
    default: "false"
  delete_tags:
    description: "Whether to delete associated tags (true/false)"
    required: false
    default: "false"
  prerelease_option:
    description: "Filter scope by pre-release status (all/true/false)"
    required: false
    default: "all"
  releases_keep_latest:
    description: "How many latest releases to keep (non-negative integer)"
    required: false
    default: "90"
  releases_keep_keyword:
    description: "Keyword(s) to keep releases, separated by / (e.g. book/tool)"
    required: false
    default: ""
  delete_workflows:
    description: "Whether to delete workflow run records (true/false)"
    required: false
    default: "false"
  workflows_keep_day:
    description: "Days to keep workflow runs (non-negative integer)"
    required: false
    default: "90"
  workflows_keep_keyword:
    description: "Keyword(s) to keep workflow runs, separated by / (e.g. book/tool)"
    required: false
    default: ""
  out_log:
    description: "Output detailed JSON logs for each step (true/false)"
    required: false
    default: "false"
  gh_token:
    description: "GitHub token for API authentication (needs contents: write, actions: write)"
    required: true

runs:
  using: "composite"
  steps:
    - shell: bash
      # All inputs are passed as environment variables to avoid shell-quoting
      # issues with special characters, spaces, and glob patterns.
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_DELETE_RELEASES: ${{ inputs.delete_releases }}
        INPUT_DELETE_TAGS: ${{ inputs.delete_tags }}
        INPUT_PRERELEASE_OPTION: ${{ inputs.prerelease_option }}
        INPUT_RELEASES_KEEP_LATEST: ${{ inputs.releases_keep_latest }}
        INPUT_RELEASES_KEEP_KEYWORD: ${{ inputs.releases_keep_keyword }}
        INPUT_DELETE_WORKFLOWS: ${{ inputs.delete_workflows }}
        INPUT_WORKFLOWS_KEEP_DAY: ${{ inputs.workflows_keep_day }}
        INPUT_WORKFLOWS_KEEP_KEYWORD: ${{ inputs.workflows_keep_keyword }}
        INPUT_OUT_LOG: ${{ inputs.out_log }}
      run: |
        # Print the action path and workflow run ID for diagnostics
        echo -e "Action path: ${{ github.action_path }}"
        echo -e "Workflow Run ID: ${GITHUB_RUN_ID}"

        # Use an absolute path to ensure the script can be found
        chmod +x "${{ github.action_path }}/del.sh"
        bash "${{ github.action_path }}/del.sh"

branding:
  icon: "terminal"
  color: "gray-dark"
